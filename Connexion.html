<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8">
<title>B.Conseil · Connexion</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>window.BC_NO_GUARD = true;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bc-config.js"></script>
<script src="bc-supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-500:#6C4DF0;
    --brand-600:#5E3FDB;
    --brand-700:#5634C9;
    --brand-100:#ECE7FD;
    --ink-900:#1C172E;
    --ink-700:#46415E;
    --ink-500:#6A667A;
    --ink-400:#9A96A8;
    --line:#ECE9F3;
    --line-strong:#E1DEEA;
    --alert:#E5484D;
    --radius:16px;
    --font:"Inter",ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--font);
    color:var(--ink-900);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    background:
      radial-gradient(900px 600px at 12% -10%, rgba(255,255,255,.16), transparent 60%),
      radial-gradient(800px 700px at 110% 120%, rgba(195,47,184,.30), transparent 55%),
      linear-gradient(150deg, #5E3FDB 0%, #6C4DF0 45%, #4A2DB0 100%);
  }

  /* subtle dotted texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.06) 1.2px, transparent 1.2px);
    background-size:26px 26px;mask:linear-gradient(180deg,#000,transparent 80%);
  }

  .auth{
    position:relative;
    width:100%;max-width:412px;
    background:#fff;
    border-radius:24px;
    box-shadow:0 30px 80px -28px rgba(20,12,50,.55), 0 2px 6px rgba(20,12,50,.12);
    padding:38px 38px 30px;
    animation:rise .5s cubic-bezier(.16,.84,.44,1);
  }
  @keyframes rise{from{transform:translateY(14px) scale(.985)}to{transform:none}}
  @media (prefers-reduced-motion: reduce){ .auth{animation:none} }

  .auth-logo{
    height:88px;display:flex;align-items:center;justify-content:center;
    margin:0 auto 22px;
  }
  .auth-logo img{height:100%;width:auto;max-width:230px;object-fit:contain;display:block}

  .auth h1{
    margin:0 0 4px;text-align:center;
    font-size:23px;font-weight:800;letter-spacing:-.02em;
  }
  .auth .sub{
    margin:0 0 26px;text-align:center;
    color:var(--ink-500);font-size:13.5px;
  }

  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-700)}
  .input-wrap{position:relative;display:flex;align-items:center}
  .input-wrap .lead{
    position:absolute;left:13px;width:17px;height:17px;color:var(--ink-400);pointer-events:none;
  }
  .field input{
    width:100%;height:46px;padding:0 14px 0 40px;
    border:1.5px solid var(--line-strong);border-radius:12px;
    font:inherit;font-size:14.5px;color:var(--ink-900);background:#fff;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input::placeholder{color:var(--ink-400)}
  .field input:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 4px rgba(108,77,240,.15)}
  .toggle-pw{
    position:absolute;right:8px;width:32px;height:32px;border:0;background:transparent;
    color:var(--ink-400);cursor:pointer;border-radius:8px;display:grid;place-items:center;
  }
  .toggle-pw:hover{color:var(--brand-600);background:var(--brand-100)}
  .toggle-pw svg{width:18px;height:18px}

  .row-between{display:flex;align-items:center;justify-content:space-between;margin:2px 0 22px}
  .remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-700);cursor:pointer;user-select:none}
  .remember input{width:16px;height:16px;accent-color:var(--brand-500);cursor:pointer}
  .link{color:var(--brand-600);font-size:13px;font-weight:600;text-decoration:none}
  .link:hover{text-decoration:underline}

  .btn{
    width:100%;height:48px;border:0;border-radius:12px;cursor:pointer;
    background:var(--brand-500);color:#fff;font:inherit;font-size:15px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:9px;
    box-shadow:0 10px 24px -8px rgba(108,77,240,.6);
    transition:background .15s, transform .05s, box-shadow .15s;
  }
  .btn:hover{background:var(--brand-600);box-shadow:0 12px 28px -8px rgba(108,77,240,.7)}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:18px;height:18px}

  .divider{
    display:flex;align-items:center;gap:12px;margin:24px 0 18px;
    color:var(--ink-400);font-size:12px;
  }
  .divider::before,.divider::after{content:"";height:1px;background:var(--line);flex:1}

  .sso{
    width:100%;height:46px;border:1.5px solid var(--line-strong);border-radius:12px;background:#fff;cursor:pointer;
    font:inherit;font-size:14px;font-weight:600;color:var(--ink-700);
    display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s,border-color .15s;
  }
  .sso:hover{background:#FAF9FE;border-color:var(--brand-500)}
  .sso svg{width:18px;height:18px;color:var(--brand-600)}

  .auth-foot{margin-top:24px;text-align:center;font-size:12px;color:var(--ink-400)}
  .auth-foot a{color:var(--ink-500);text-decoration:none;font-weight:600}
  .auth-foot a:hover{color:var(--brand-600)}

  .err{display:none;color:var(--alert);font-size:12.5px;margin:-8px 0 14px;font-weight:600}
  .err.show{display:block}
</style>
</head>
<body>
  <main class="auth">
    <div class="auth-logo"><img src="assets/bconseil-logo.png" alt="B.Conseil"></div>
    <h1>Heureux de vous revoir</h1>
    <p class="sub">Connectez-vous à votre espace de suivi clients.</p>

    <form id="login-form" novalidate="">
      <div class="field" id="field-name" style="display:none">
        <label for="name">Nom complet</label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
          <input id="name" type="text" placeholder="Alexandra Boscary" autocomplete="name">
        </div>
      </div>

      <div class="field">
        <label for="email">Adresse email</label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg>
          <input id="email" type="email" placeholder="vous@b-conseil.com" autocomplete="username">
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher le mot de passe">
            <svg id="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div class="err" id="err">Veuillez renseigner votre email et votre mot de passe.</div>

      <div class="row-between">
        <label class="remember"><input type="checkbox" id="remember" checked=""> Se souvenir de moi</label>
        <a href="#" class="link">Mot de passe oublié ?</a>
      </div>

      <button class="btn" type="submit">
        <span id="btn-label">Se connecter</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>
      </button>
    </form>

    <div class="divider">ou</div>
    <button class="sso" type="button" id="sso-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      Connexion sécurisée SSO
    </button>

    <p class="auth-foot"><span id="foot-prompt">Pas encore de compte ?</span> <a href="#" id="toggle-mode">Créer un compte</a></p>
  </main>

<script>
(function(){
  var form=document.getElementById('login-form');
  var err=document.getElementById('err');
  var pw=document.getElementById('password');
  var toggle=document.getElementById('toggle-pw');
  var eye=document.getElementById('eye');

  toggle.addEventListener('click',function(){
    var show = pw.type==='password';
    pw.type = show ? 'text' : 'password';
    eye.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><path d="m1 1 22 22"></path><path d="M9.5 9.5a3 3 0 0 0 4.2 4.2"></path>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle>';
  });

  var DEST='Tableau de bord B.Conseil.html';
  var btn=form.querySelector('.btn');
  var label=document.getElementById('btn-label');
  var fieldName=document.getElementById('field-name');
  var toggleMode=document.getElementById('toggle-mode');
  var footPrompt=document.getElementById('foot-prompt');
  var title=document.querySelector('.auth h1');
  var sub=document.querySelector('.auth .sub');
  var mode='signin';

  // Si déjà connecté, on saute directement à l'espace.
  BC.auth.getSession().then(function(s){ if(s) window.location.replace(DEST); });

  function showErr(msg){ err.textContent=msg; err.classList.add('show'); }
  function translate(ex){
    var m=(ex&&ex.message)||'';
    if(/invalid login credentials/i.test(m)) return 'Email ou mot de passe incorrect.';
    if(/already registered/i.test(m)) return 'Un compte existe déjà avec cet email.';
    if(/password should be at least/i.test(m)) return 'Mot de passe : 6 caractères minimum.';
    if(/email/i.test(m)&&/invalid/i.test(m)) return 'Adresse email invalide.';
    return m || 'Une erreur est survenue. Réessayez.';
  }

  function setMode(m){
    mode=m; err.classList.remove('show');
    if(m==='signup'){
      fieldName.style.display=''; label.textContent='Créer mon compte';
      title.textContent='Créer votre compte'; sub.textContent='Rejoignez l’espace B.Conseil.';
      footPrompt.textContent='Déjà un compte ?'; toggleMode.textContent='Se connecter';
    } else {
      fieldName.style.display='none'; label.textContent='Se connecter';
      title.textContent='Heureux de vous revoir'; sub.textContent='Connectez-vous à votre espace de suivi clients.';
      footPrompt.textContent='Pas encore de compte ?'; toggleMode.textContent='Créer un compte';
    }
  }
  toggleMode.addEventListener('click',function(e){ e.preventDefault(); setMode(mode==='signin'?'signup':'signin'); });

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var email=document.getElementById('email').value.trim();
    var pass=pw.value.trim();
    var name=document.getElementById('name').value.trim();
    if(!email || !pass || email.indexOf('@')<1){ showErr('Veuillez renseigner votre email et votre mot de passe.'); return; }
    if(mode==='signup' && pass.length<6){ showErr('Mot de passe : 6 caractères minimum.'); return; }
    err.classList.remove('show');
    var prev=label.textContent;
    label.textContent= mode==='signup'?'Création…':'Connexion…';
    btn.style.opacity='.85'; btn.disabled=true;
    function reset(){ label.textContent=prev; btn.style.opacity=''; btn.disabled=false; }

    var op = mode==='signup' ? BC.auth.signUp(email, pass, {name:name}) : BC.auth.signIn(email, pass);
    op.then(function(res){
      if(res.error) throw res.error;
      if(mode==='signup' && !(res.data && res.data.session)){
        showErr('Compte créé. Confirmez votre email puis connectez-vous.'); setMode('signin'); reset(); return;
      }
      window.location.href=DEST;
    }).catch(function(ex){ showErr(translate(ex)); reset(); });
  });

  document.getElementById('sso-btn').addEventListener('click', function(){
    showErr('La connexion SSO sera bientôt disponible. Utilisez votre email pour l’instant.');
  });
})();
</script>
</body></html>
